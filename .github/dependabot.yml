version: 2
updates:
  # npm dependencies (production + dev)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk patch/minor bumps into a single PR
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used in workflows (kept SHA-pinned, updated with version comments)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
